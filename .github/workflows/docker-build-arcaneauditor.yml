name: Build ArcaneAuditor Docker Image

on:
  workflow_dispatch:
    inputs:
      version:
        description: ArcaneAuditor CLI version (e.g. 2.0.0)
        type: string
        required: true
      release_candidate:
        description: Mark this build as a release candidate
        type: boolean
        default: false

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image tag
        id: tag
        run: |
          VERSION="${{ inputs.version }}"
          if [ "${{ inputs.release_candidate }}" = "true" ]; then
            SUFFIX="-rc-$(date -u '+%Y%m%d_%H%M%S')"
            TAG="${VERSION}${SUFFIX}"
          else
            TAG="$VERSION"
          fi
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - name: Download ArcaneAuditor CLI
        run: wget https://github.com/Developers-and-Dragons/ArcaneAuditor/releases/download/v${{ inputs.version }}/ArcaneAuditor_linux_CLI.tar.gz

      - name: Extract ArcaneAuditor CLI
        run: tar vzxf ArcaneAuditor_linux_CLI.tar.gz

      - name: Build Docker image
        run: docker build -f Dockerfile.arcaneauditor -t ghcr.io/${{ github.repository_owner }}/arcaneauditor-runner:${{ steps.tag.outputs.tag }} .

      - name: Push Docker image
        run: docker push ghcr.io/${{ github.repository_owner }}/arcaneauditor-runner:${{ steps.tag.outputs.tag }}
